# Configuração do Banco de Dados H2 em Arquivo Local
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./tutor-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Configuração do Hibernate ORM (Criação/Atualização automática de tabelas)
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Configuração de Logs
quarkus.log.level=INFO
quarkus.log.category."com.english.tutor".level=INFO
quarkus.log.file.enable=true
quarkus.log.file.path=logs/tutor-backend.log
quarkus.log.file.level=INFO
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n

# Configuração de Segurança JWT (SmallRye)
mp.jwt.verify.issuer=https://tutor.english.com/issuer
mp.jwt.verify.publickey.location=publickey.pem
smallrye.jwt.sign.key.location=privatekey.pem

# Configuração da API do Gemini
gemini-api/mp-rest/url=https://generativelanguage.googleapis.com
gemini.api.key=${GEMINI_API_KEY:mock-key}
%test.gemini.api.key=test-gemini-key
gemini.model=gemini-3.1-flash-lite

# Configuração de CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.headers=accept,authorization,content-type
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# Logging do REST Client
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=2048
quarkus.log.category."org.jboss.resteasy.reactive.client.logging".level=DEBUG

# Desativação de Dev Services e Analytics (impede necessidade de Docker local e prompts interativos)
quarkus.devservices.enabled=false
quarkus.datasource.devservices=false
quarkus.analytics.disabled=true




